version: '3.8'

# Phase 5 default topology:
# - postgres + redis + go-api + go-worker are the Go-owned backend cutover path.
# - the Python web UI remains available only as an optional compatibility shell profile.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex
      POSTGRES_DB: codex_console
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  go-api:
    image: golang:1.25
    working_dir: /workspace/backend-go
    command: sh -lc "go run ./cmd/api"
    environment:
      APP_ENV: development
      HTTP_ADDR: :18080
      DATABASE_URL: postgres://codex:codex@postgres:5432/codex_console?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      POSTGRES_MIN_CONNS: 2
      POSTGRES_MAX_CONNS: 20
      WORKER_CONCURRENCY: 50
    volumes:
      - .:/workspace
    depends_on:
      - postgres
      - redis
    ports:
      - "18080:18080"
    restart: unless-stopped

  go-worker:
    image: golang:1.25
    working_dir: /workspace/backend-go
    command: sh -lc "go run ./cmd/worker"
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://codex:codex@postgres:5432/codex_console?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      POSTGRES_MIN_CONNS: 2
      POSTGRES_MAX_CONNS: 20
      WORKER_CONCURRENCY: 50
    volumes:
      - .:/workspace
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  webui:
    profiles: ["compat-ui"]
    build: .
    shm_size: "1gb"
    ports:
      - "1455:1455"
      - "6080:6080"
      # 如需使用 VNC 客户端直连可打开：
      # - "5900:5900"
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=1455
      - DISPLAY=:99
      - ENABLE_VNC=1
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - DEBUG=0
      - LOG_LEVEL=info
      # 如果需要访问密码，可以在这里取消注释并设置
      - WEBUI_ACCESS_PASSWORD=admin123
    volumes:
      # 挂载数据目录以持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres-data:
